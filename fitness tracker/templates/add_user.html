<!DOCTYPE html>
<html>
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

  <title>Add User</title>
</head>
<body>
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="container mt-3">
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">Fitness Tracker</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
        <li class="nav-item"><a class="nav-link active" aria-current="page" href="/add_user">Add User</a></li>
        <li class="nav-item"><a class="nav-link" href="/add_workout">Add Workout</a></li>
        <li class="nav-item"><a class="nav-link" href="/progress">Progress</a></li>
        <li class="nav-item"><a class="nav-link" href="/report">Report</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="page-container">
  <div class="card-form">
    <h2 class="mb-3">Register New User</h2>
    <form method="POST" novalidate>
      <div class="mb-3">
        <label class="form-label" for="name">Name</label>
        <input id="name" name="name" class="form-control" required placeholder="Full name">
      </div>

      <div class="form-row mb-3">
        <div class="col">
          <label class="form-label" for="age">Age</label>
          <input id="age" name="age" type="number" class="form-control" min="0" placeholder="e.g. 29">
        </div>
        <div class="col">
          <label class="form-label" for="gender">Gender</label>
          <select id="gender" name="gender" class="form-control">
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
          </select>
        </div>
      </div>

      <div class="form-row mb-3">
        <div class="col">
          <label class="form-label" for="height">Height (cm)</label>
          <input id="height" name="height" type="number" class="form-control" placeholder="e.g. 170">
        </div>
        <div class="col">
          <label class="form-label" for="weight">Weight (kg)</label>
          <input id="weight" name="weight" type="number" class="form-control" placeholder="e.g. 70">
        </div>
      </div>

      <div class="d-flex justify-content-end">
        <button type="submit" class="btn btn-primary">Add User</button>
      </div>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
