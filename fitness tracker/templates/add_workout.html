<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Log Workout</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="container mt-3">
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Fitness Tracker</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/add_user">Add User</a></li>
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="/add_workout">Add Workout</a></li>
                    <li class="nav-item"><a class="nav-link" href="/progress">Progress</a></li>
                    <li class="nav-item"><a class="nav-link" href="/report">Report</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="page-container">
        <div class="card-form">
            <h2 class="mb-3">Log a Workout</h2>
            <form method="POST" novalidate>
                <div class="mb-3">
                    <label class="form-label" for="user_id">User</label>
                    <select id="user_id" name="user_id" class="form-control">
                        {% for u in users %}
                            <option value="{{ u.user_id }}">{{ u.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="workout_id">Workout</label>
                    <select id="workout_id" name="workout_id" class="form-control">
                        {% for w in workouts %}
                            <option value="{{ w.workout_id }}">{{ w.workout_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-row mb-3">
                    <div class="col">
                        <label class="form-label" for="duration">Duration (min)</label>
                        <input id="duration" type="number" name="duration" class="form-control" min="0" placeholder="e.g. 45">
                    </div>
                    <div class="col">
                        <label class="form-label" for="date">Date</label>
                        <input id="date" type="date" name="date" class="form-control">
                    </div>
                </div>

                <div class="d-flex justify-content-end">
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
