<!DOCTYPE html>
<html>
<head>
  <title>Edit User</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="container mt-3">
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<h2 class="mb-3">Edit User</h2>

<form method="POST" class="card p-4">

    <label>Name</label>
    <input name="name" class="form-control mb-3" value="{{ user.name }}">

    <label>Age</label>
    <input name="age" class="form-control mb-3" type="number" value="{{ user.age }}">

    <label>Gender</label>
    <select name="gender" class="form-control mb-3">
        <option {{ 'selected' if user.gender=='Male' else '' }}>Male</option>
        <option {{ 'selected' if user.gender=='Female' else '' }}>Female</option>
        <option {{ 'selected' if user.gender=='Other' else '' }}>Other</option>
    </select>

    <label>Height (cm)</label>
    <input name="height" class="form-control mb-3" value="{{ user.height }}">

    <label>Weight (kg)</label>
    <input name="weight" class="form-control mb-3" value="{{ user.weight }}">

    <button class="btn btn-primary">Update</button>
</form>

</body>
</html>
